<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Напоминалка⏰</title>
<link rel="icon" href="https://img.freepik.com/premium-vector/ringing-alarm-clock-with-two-bells-illustration-cartoon-isolated-dinamic-image-green-yellow-color-morning-alarm-clock_124848-425.jpg" type="image/jpeg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  transition: 0.4s;
  color: azure;
}

/* 🌌 ТЕМА 1 */
body.theme1 {
  background: radial-gradient(circle at 10% 20%, #7aa2ff 0%, transparent 40%),
              radial-gradient(circle at 90% 80%, #b07cff 0%, transparent 45%),
              linear-gradient(135deg, #1b1f3a, #2a1f4a);
  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.75);
}

/* 🖤 ТЕМА 2 */
body.theme2 {
  background: radial-gradient(circle at 20% 30%, #333 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #111 0%, transparent 45%),
              linear-gradient(135deg, #0a0a0a, #151515);
  --text-main: #eaeaea;
  --text-soft: rgba(255,255,255,0.65);
}

body { color: var(--text-main); }
small { color: var(--text-soft); }

/* GLASS */
.карточка {
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(25px);
}

.элемент {
  border-radius: 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  transition: 0.3s;
}

.элемент:hover {
  transform: translateY(-4px);
}

/* INPUT GLASS */
input {
  border-radius: 12px !important;
  border: 1px solid rgba(255,255,255,0.15) !important;
  background: rgba(255,255,255,0.08) !important;
  color: var(--text-main) !important;
}

/* ✅ FIX PLACEHOLDER */
input::placeholder {
  color: azure !important;
  opacity: 1;
}

input::-webkit-input-placeholder {
  color: azure !important;
}

input:-ms-input-placeholder {
  color: azure !important;
}

input::-ms-input-placeholder {
  color: azure !important;
}

.выполнено {
  text-decoration: line-through;
  opacity: 0.6;
}
</style>
</head>

<body class="theme1">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>🎯 Мои цели</h1>
  <button id="themeBtn" class="btn btn-outline-light" style="font-style:Italic;">Тема🌙</button>
</div>

<!-- FORM -->
<div class="card карточка mb-4 p-2">
  <div class="card-body">
    <form id="form">
      <div class="row g-2">
        <div class="col-md-4">
          <input type="text" id="title" class="form-control" placeholder="Название" required>
        </div>
        <div class="col-md-4">
          <input type="text" id="desc" class="form-control" placeholder="Описание">
        </div>
        <div class="col-md-2">
          <input type="datetime-local" id="date" class="form-control">
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- LIST -->
<div class="card карточка mb-4 p-2">
  <div class="card-body" style="color:azure;">
    <h5>Список задач</h5>
    <div id="list" class="d-flex flex-column gap-2"></div>
  </div>
</div>

<!-- STATS -->
<div class="card карточка p-2">
  <div class="card-body" style="color:azure;">
    <h5>📊 Статистика</h5>
    <div id="stats" style="color:azure;"></div>
  </div>
</div>

</div>

<script>
let задачи = JSON.parse(localStorage.getItem('задачи')) || [];
let theme = localStorage.getItem('theme') || 'theme1';

document.body.className = theme;

const list = document.getElementById('list');
const stats = document.getElementById('stats');

/* THEME */
document.getElementById('themeBtn').onclick = () => {
  const t = document.body.classList.contains('theme1') ? 'theme2' : 'theme1';
  document.body.className = t;
  localStorage.setItem('theme', t);
};

/* SAVE */
function save(){
  localStorage.setItem('задачи', JSON.stringify(задачи));
}

/* ADD */
function add(t,d,date){
  задачи.push({
    title: t,
    desc: d,
    date: date || new Date().toISOString(),
    done: false,
    editing: false
  });
}

/* FORMAT */
function formatDateForInput(dateStr){
  const d = new Date(dateStr);
  return d.toISOString().slice(0,16);
}

/* RENDER */
function render(){
  list.innerHTML = '';

  задачи.forEach((z,i)=>{
    const div = document.createElement('div');
    div.className = 'элемент p-3';

    if(z.editing){
      div.innerHTML = `
        <input id="et${i}" class="form-control mb-2" value="${z.title}" oninput="autoSave(${i})" placeholder="Название">
        <input id="ed${i}" class="form-control mb-2" value="${z.desc || ''}" oninput="autoSave(${i})" placeholder="Описание">
        <input id="edate${i}" type="datetime-local" class="form-control mb-2" 
          value="${formatDateForInput(z.date)}"
          onchange="autoSave(${i})"
        >
        <div class="text-end">
          <button onclick="finishEdit(${i})" class="btn btn-success btn-sm">
            <i class="bi bi-check"></i>
          </button>
        </div>
      `;
    } else {
      div.classList.add('d-flex','justify-content-between','align-items-center');

      div.innerHTML = `
        <div>
          <b class="${z.done ? 'выполнено':''}">${z.title}</b><br>
          <small>
            ${z.desc || ''}<br>
            🕒 ${new Date(z.date).toLocaleString()}
          </small>
        </div>
        <div>
          <button onclick="toggle(${i})" class="btn btn-success btn-sm me-1"><i class="bi bi-check"></i></button>
          <button onclick="edit(${i})" class="btn btn-warning btn-sm me-1"><i class="bi bi-pencil"></i></button>
          <button onclick="del(${i})" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i></button>
        </div>
      `;
    }

    list.appendChild(div);
  });

  renderStats();
  save();
}

/* AUTOSAVE */
function autoSave(i){
  задачи[i].title = document.getElementById('et'+i).value;
  задачи[i].desc = document.getElementById('ed'+i).value;
  задачи[i].date = document.getElementById('edate'+i).value;
  save();
}

/* ACTIONS */
function edit(i){ задачи[i].editing = true; render(); }
function finishEdit(i){ задачи[i].editing = false; render(); }
function toggle(i){ задачи[i].done = !задачи[i].done; render(); }
function del(i){ задачи.splice(i,1); render(); }

/* STATS */
function renderStats(){
  const total = задачи.length;
  const done = задачи.filter(z=>z.done).length;
  const percent = total ? Math.round(done/total*100) : 0;

  stats.innerHTML = `
    Всего: <b>${total}</b><br>
    Выполнено: <b>${done}</b><br>
    Прогресс: <b>${percent}%</b>
    <div class="progress mt-2">
      <div class="progress-bar" style="width:${percent}%; transition:0.5s; background-color:green;"></div>
    </div>
  `;
}

/* FORM */
document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();

  const t = title.value.trim();
  const d = desc.value.trim();
  const date = document.getElementById('date').value;

  if(!t) return;

  add(t,d,date);
  e.target.reset();
  render();
});

render();
</script>

</body>
</html>
