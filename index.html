<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои задачи</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  transition: 0.4s;
}

/* 🌌 ТЕМА 1 — СИНЕЕ ЖИДКОЕ СТЕКЛО */
body.theme1 {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

/* 🖤 ТЕМА 2 — ЧЁРНОЕ ЖИДКОЕ СТЕКЛО */
body.theme2 {
  background: linear-gradient(135deg, #0f0f10, #1b1b2a);
  color: white;
}

/* 🪟 ОБЩЕЕ СТЕКЛО */
.карточка {
  border-radius: 20px;
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.элемент {
  border-radius: 15px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.15);
  transition: 0.3s;
  color: white;
}

.элемент:hover {
  transform: translateY(-3px) scale(1.01);
}

/* input glass */
input {
  border-radius: 12px !important;
  border: none !important;
  background: rgba(255,255,255,0.15) !important;
  color: white !important;
}

input::placeholder {
  color: rgba(255,255,255,0.7);
}

/* кнопки */
.btn {
  border-radius: 10px !important;
  transition: 0.2s;
}
.btn:hover { transform: scale(1.08); }

.выполнено {
  text-decoration: line-through;
  opacity: 0.6;
}

/* прогресс */
.progress {
  height: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
}
/* 🎯 АДАПТИВНЫЙ ЦВЕТ ТЕКСТА */

/* основный текст */
body.theme1 {
  --text-main: #ffffff;
  --text-soft: rgba(255,255,255,0.75);
}

body.theme2 {
  --text-main: #eaeaea;
  --text-soft: rgba(255,255,255,0.65);
}

/* применяем */
body {
  color: var(--text-main);
}

h1, h5, b {
  color: var(--text-main);
}

small {
  color: var(--text-soft);
}

/* текст в карточках */
.карточка,
.элемент {
  color: var(--text-main);
}

/* input текст */
input {
  color: var(--text-main) !important;
}

input::placeholder {
  color: var(--text-soft);
}

/* кнопка темы (чтобы не слепила) */
#themeBtn {
  color: var(--text-main);
  border-color: rgba(255,255,255,0.3);
}

/* прогресс текст */
#stats {
  color: var(--text-main);
}
</style>
</head>

<body class="theme1">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>📌 Мои задачи</h1>

  <button id="themeBtn" class="btn btn-outline-light">
    <i class="bi bi-droplet"></i> Тема
  </button>
</div>

<!-- Добавление -->
<div class="card карточка mb-4 p-2">
  <div class="card-body">
    <form id="form">
      <div class="row g-2">
        <div class="col-md-5">
          <input type="text" id="title" class="form-control" placeholder="Название" required>
        </div>
        <div class="col-md-5">
          <input type="text" id="desc" class="form-control" placeholder="Описание">
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- список -->
<div class="card карточка mb-4 p-2">
  <div class="card-body">
    <h5>Список задач</h5>
    <div id="list" class="d-flex flex-column gap-2"></div>
  </div>
</div>

<!-- статистика -->
<div class="card карточка p-2">
  <div class="card-body">
    <h5>📊 Статистика</h5>
    <div id="stats"></div>
  </div>
</div>

</div>

<script>
let задачи = JSON.parse(localStorage.getItem('задачи')) || [];

/* 🌗 темы: 1 или 2 */
let theme = localStorage.getItem('theme') || 'theme1';
document.body.className = theme;

let list = document.getElementById('list');
let stats = document.getElementById('stats');
let themeBtn = document.getElementById('themeBtn');

/* переключение темы */
themeBtn.onclick = () => {
  if(document.body.classList.contains('theme1')){
    document.body.className = 'theme2';
    localStorage.setItem('theme','theme2');
  } else {
    document.body.className = 'theme1';
    localStorage.setItem('theme','theme1');
  }
}

function save(){
  localStorage.setItem('задачи', JSON.stringify(задачи));
}

function render(){
  list.innerHTML = '';

  задачи.forEach((z,i)=>{
    let div = document.createElement('div');
    div.className = 'элемент p-3 d-flex justify-content-between align-items-center';

    div.innerHTML = `
      <div>
        <b class="${z.done ? 'выполнено' : ''}">${z.title}</b><br>
        <small>${z.desc || ''}</small>
      </div>
      <div>
        <button onclick="toggle(${i})" class="btn btn-success btn-sm me-1"><i class="bi bi-check"></i></button>
        <button onclick="edit(${i})" class="btn btn-warning btn-sm me-1"><i class="bi bi-pencil"></i></button>
        <button onclick="del(${i})" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i></button>
      </div>
    `;
    list.appendChild(div);
  });

  renderStats();
  save();
}

function renderStats(){
  let total = задачи.length;
  let done = задачи.filter(z=>z.done).length;
  let percent = total ? Math.round(done/total*100) : 0;

  stats.innerHTML = `
    Всего: <b>${total}</b><br>
    Выполнено: <b>${done}</b><br>
    Прогресс: <b>${percent}%</b>
    <div class="progress mt-2">
      <div class="progress-bar bg-success" style="width:${percent}%"></div>
    </div>
  `;
}

function add(t,d){
  задачи.push({title:t,desc:d,done:false});
  save(); render();
}

function edit(i){
  let t = prompt('Название', задачи[i].title);
  if(t===null) return;
  let d = prompt('Описание', задачи[i].desc);
  задачи[i].title=t;
  задачи[i].desc=d;
  save(); render();
}

function del(i){ задачи.splice(i,1); save(); render(); }
function toggle(i){ задачи[i].done=!задачи[i].done; save(); render(); }

form.addEventListener('submit', e=>{
  e.preventDefault();
  let t = title.value.trim();
  let d = desc.value.trim();
  if(!t) return;
  add(t,d);
  form.reset();
});

render();
</script>

</body>
</html>
