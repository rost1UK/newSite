<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Goals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; }
    .карточка { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .элемент { border-radius: 12px; transition: all 0.2s; }
    .элемент:hover { transform: scale(1.01); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="container py-4">
  <h1 class="mb-4 text-center">🎯 Мои цели</h1>

  <div class="card mb-4 карточка">
    <div class="card-body">
      <h5 class="card-title">Добавить цель</h5>
      <form id="goalForm">
        <div class="row g-2">
          <div class="col-md-4">
            <input type="text" id="title" class="form-control" placeholder="Название" required>
          </div>
          <div class="col-md-4">
            <input type="text" id="description" class="form-control" placeholder="Описание">
          </div>
          <div class="col-md-3">
            <input type="datetime-local" id="deadline" class="form-control" required>
          </div>
          <div class="col-md-1">
            <button class="btn btn-primary w-100">+</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="card mb-4 карточка">
    <div class="card-body d-flex justify-content-between align-items-center">
      <span><b>Сортировка:</b></span>
      <select id="sortSelect" class="form-select w-auto" onchange="renderGoals()">
        <option value="date">По дате (ближайшие)</option>
        <option value="dateDesc">По дате (дальние)</option>
        <option value="status">По выполнению</option>
      </select>
    </div>
  </div>

  <div class="card mb-4 карточка">
    <div class="card-body">
      <h5 class="card-title">Список целей</h5>
      <ul id="goalList" class="list-group элемент"></ul>
    </div>
  </div>

  <div class="card карточка">
    <div class="card-body">
      <h5 class="card-title">📊 Статистика</h5>
      <p id="stats"></p>
    </div>
  </div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem('goals')) || [];

let goalForm = document.getElementById('goalForm');
let goalList = document.getElementById('goalList');
let stats = document.getElementById('stats');
let sortSelect = document.getElementById('sortSelect');

function saveGoals() {
  localStorage.setItem('goals', JSON.stringify(goals));
}

function removeExpired() {
  let now = Date.now();
  goals = goals.filter(g => {
    let time = Date.parse(g.deadline);
    if (isNaN(time)) return true;
    return time > now - 60000;
  });
}

function sortGoals() {
  let type = sortSelect.value;
  if (type === 'date') {
    goals.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  } else if (type === 'dateDesc') {
    goals.sort((a, b) => new Date(b.deadline) - new Date(a.deadline));
  } else if (type === 'status') {
    goals.sort((a, b) => a.done - b.done);
  }
}

function renderGoals() {
  removeExpired();
  sortGoals();

  goalList.innerHTML = '';

  goals.forEach((goal, index) => {
    let now = Date.now();
    let timeLeft = new Date(goal.deadline).getTime() - now;
    let twoDays = 2 * 24 * 60 * 60 * 1000;

    let li = document.createElement('li');
    li.className = 'list-group-item d-flex justify-content-between align-items-center';

    if (timeLeft < twoDays) li.classList.add('list-group-item-danger');

    li.innerHTML = `
      <div>
        <strong style="text-decoration:${goal.done ? 'line-through' : 'none'}">${goal.title}</strong>
        <br>
        <small>${goal.description || ''}</small>
        <br>
        <small>⏰ до: ${new Date(goal.deadline).toLocaleString()}</small>
      </div>
      <div>
        <button class="btn btn-sm me-1" onclick="toggleDone(${index})" style="background-color: #06c93a;">✔</button>
        <button class="btn btn-warning btn-sm me-1" onclick="editGoal(${index})">✏</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGoal(${index})">🗑</button>
      </div>
    `;

    goalList.appendChild(li);
  });

  saveGoals();
  renderStats();
}

function renderStats() {
  let total = goals.length;
  let done = goals.filter(g => g.done).length;
  let percent = total ? Math.round((done / total) * 100) : 0;

  stats.innerHTML = `
    Всего целей: <strong>${total}</strong><br>
    Выполнено: <strong>${done}</strong><br>
    Прогресс: <strong>${percent}%</strong>
    <div class="progress mt-2">
      <div class="progress-bar" style="width:${percent}%"></div>
    </div>
  `;
}

function addGoal(title, description, deadline) {
  goals.push({ title, description, deadline, done: false });
  saveGoals();
  renderGoals();
}

function deleteGoal(index) {
  if (confirm('Удалить цель?')) {
    goals.splice(index, 1);
    saveGoals();
    renderGoals();
  }
}

function toggleDone(index) {
  goals[index].done = !goals[index].done;
  saveGoals();
  renderGoals();
}

function editGoal(index) {
  let newTitle = prompt('Новое название', goals[index].title);
  if (newTitle !== null) {
    let newDesc = prompt('Новое описание', goals[index].description);
    goals[index].title = newTitle;
    goals[index].description = newDesc;
    saveGoals();
    renderGoals();
  }
}

goalForm.addEventListener('submit', e => {
  e.preventDefault();
  let title = document.getElementById('title').value.trim();
  let description = document.getElementById('description').value.trim();
  let deadline = document.getElementById('deadline').value;
  if (!title || !deadline) return;
  addGoal(title, description, deadline);
  goalForm.reset();
});

setInterval(renderGoals, 30000);
renderGoals();
</script>

</body>
</html>
